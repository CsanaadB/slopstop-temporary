name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

# TODO: figure out e2e tests, testing extensions seems to require a headed browser
# (check a virtual display like Xvfb)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run test:unit
